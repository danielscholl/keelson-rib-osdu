name: Feature request
description: Propose a capability or change to the OSDU rib.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This rib is the OSDU / CIMPL bridge for Keelson. All OSDU and cluster
        knowledge lives here; the harness stays domain-free. Propose your idea here
        and we'll figure out where it fits.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the rib does this touch?
      options:
        - Cluster ICC / topology
        - Quality lane
        - Features lane
        - Security lane
        - Release Train / Waiting / Events
        - Cluster actions (lifecycle / credentials)
        - Chat tools
        - Docs
        - Not sure / other
    validations:
      required: true
