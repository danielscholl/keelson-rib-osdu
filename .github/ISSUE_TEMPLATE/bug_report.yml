name: Bug report
description: Something in the OSDU rib isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. This is a [Keelson](https://github.com/danielscholl/keelson)
        rib — please confirm it still reproduces on the latest release first. For a
        security issue, do **not** file here — see keelson's
        [SECURITY.md](https://github.com/danielscholl/keelson/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: The actual behavior, with the exact view, workflow, or cluster action that triggered it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. KEELSON_RIBS=osdu bun dev  (or `keelson rib add …`)
        2. open the CIMPL surface
        3. run the osdu-quality workflow
        4. ...
    validations:
      required: true
  - type: textarea
    id: collector
    attributes:
      label: Collector output (if a view is wrong)
      description: For a view/data bug, paste the relevant `bun run collect:<name> | jq .` output. Redact any secrets.
      render: json
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: The rib version (or commit), your keelson version, OS, kubectl context, and which OSDU CLIs are on PATH (cimpl / osdu-activity / osdu-quality / glab).
      render: text
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before filing
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: This is an OSDU rib bug, not a harness (keelson) issue.
          required: false
